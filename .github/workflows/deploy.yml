name: 🚀 Build & Deploy to VM

# ============================
# KHI NÀO CHẠY?
# ============================
on:
  push:
    branches: [main]        # Chỉ chạy khi push vào branch main
  workflow_dispatch:         # Cho phép chạy thủ công từ GitHub UI

# ============================
# BIẾN MÔI TRƯỜNG CHUNG
# ============================
env:
  FRONTEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/badminton-frontend
  BACKEND_IMAGE: ${{ secrets.DOCKER_USERNAME }}/badminton-backend

# ============================
# JOBS
# ============================
jobs:
  # ─────────────────────────
  # JOB 1: Build & Push Docker Images
  # ─────────────────────────
  build:
    name: 🔨 Build Docker Images
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout code từ repo
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      # Bước 2: Setup Docker Buildx (build nhanh hơn, có cache)
      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 3: Login vào Docker Hub
      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Build & Push Frontend image
      - name: 🎨 Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:latest
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Bước 5: Build & Push Backend image
      - name: ☕ Build & Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:latest
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────
  # JOB 2: Deploy to VM
  # ─────────────────────────
  deploy:
    name: 🚀 Deploy to VM
    runs-on: ubuntu-latest
    needs: build              # Chỉ chạy SAU KHI build xong
    if: github.ref == 'refs/heads/main'

    steps:
      # Bước 1: SSH vào VM và deploy
      - name: 📡 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            echo "🚀 Starting deployment..."

            # Vào thư mục project
            cd ~/apps/BadmintonRecordRevenueSystem

            # Pull latest code (để lấy docker-compose.yml mới nhất)
            git pull origin main

            # Login Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Pull images mới từ Docker Hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/badminton-frontend:latest
            docker pull ${{ secrets.DOCKER_USERNAME }}/badminton-backend:latest

            # Restart services
            docker compose down
            docker compose up -d

            # Dọn dẹp images cũ
            docker image prune -f

            echo "✅ Deployment completed!"

      # Bước 2: Health check
      - name: ❤️ Health Check
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USERNAME }}
          key: ${{ secrets.VM_SSH_KEY }}
          port: ${{ secrets.VM_PORT }}
          script: |
            echo "⏳ Waiting for services to start..."
            sleep 15

            echo "📋 Container status:"
            docker compose -f ~/apps/BadmintonRecordRevenueSystem/docker-compose.yml ps

            echo ""
            echo "🔍 Testing API..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/products || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ API responding: HTTP $HTTP_STATUS"
            else
              echo "⚠️ API returned: HTTP $HTTP_STATUS"
            fi

            echo ""
            echo "🔍 Testing Frontend..."
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/ || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "✅ Frontend responding: HTTP $HTTP_STATUS"
            else
              echo "⚠️ Frontend returned: HTTP $HTTP_STATUS"
            fi