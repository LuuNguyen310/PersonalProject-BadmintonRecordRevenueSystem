spring.application.name=BadmintonPaymentRecord-BE

server.port=8080
# spring.datasource.url=jdbc:postgresql://localhost:5432/BadmintonRevenueRecordDB?stringtype=unspecified
# spring.datasource.username=postgres
# spring.datasource.password=12345
spring.datasource.url=jdbc:postgresql://postgres:5432/${DB_NAME:BadmintonRevenueRecordDB}?stringtype=unspecified
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:12345}


spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true