version: '3.8'

services:
  # ============================
  # PostgreSQL Database
  # ============================
  postgres:
    image: postgres:16-alpine
    container_name: badminton-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-BadmintonRevenueRecordDB}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-12345}
    ports:
      - "5432:5432"            # Expose để debug, production nên bỏ
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/ThachDaBadminton.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - badminton-network

  # ============================
  # Spring Boot Backend
  # ============================
  backend:
    image: ${DOCKER_USERNAME}/badminton-backend:latest    # ← DÙng image từ Docker Hub
    # build:
    #   context: ./backend
    #   dockerfile: Dockerfile
    container_name: badminton-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_NAME: ${DB_NAME:-BadmintonRevenueRecordDB}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-12345}
    ports:
      - "8080:8080"            # Expose để debug, production nên bỏ
    networks:
      - badminton-network

  # ============================
  # Next.js Frontend
  # ============================
  frontend:
    image: ${DOCKER_USERNAME}/badminton-frontend:latest   # ← Dùng image từ Docker Hub
    # build:
    #   context: ./frontend
    #   dockerfile: Dockerfile
    #   args:
    #     NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api}
    container_name: badminton-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"            # Expose để debug, production nên bỏ
    networks:
      - badminton-network

  # ============================
  # Nginx Reverse Proxy
  # ============================
  nginx:
    image: nginx:alpine
    container_name: badminton-nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - badminton-network

volumes:
  postgres_data:
    driver: local

networks:
  badminton-network:
    driver: bridge